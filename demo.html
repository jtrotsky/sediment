<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sediment — demo</title>
<link rel="stylesheet" href="sediment.css">
<style>
  /* Demo-only chrome — not part of Sediment. */
  body { margin: 0; padding: 32px; background: #3e332f; color: #edf3d7;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  h1 { font-size: 14px; font-weight: 400; opacity: 0.7; margin: 0 0 24px; }
  .card { position: relative; background: rgba(0,0,0,0.25); border-radius: 8px;
    padding: 21px 16px; margin-bottom: 24px; max-width: 520px; }
  .card h2 { font-size: 12px; font-weight: 400; margin: 0 0 8px; }
  /* theme the optional tooltip */
  :root { --sediment-tip-bg: #edf3d7; --sediment-tip-ink: #3e332f;
    --sediment-tip-border: rgba(62,51,47,0.5); }
</style>
</head>
<body>
<h1>Sediment — dependency-free SVG charts</h1>

<div class="card">
  <h2>Risk profile — dotPlot</h2>
  <div id="risk"></div>
</div>

<div class="card">
  <h2>Monthly savings — columnChart</h2>
  <div id="cols"></div>
</div>

<!-- one shared tooltip element for all charts on the page -->
<div id="tip" class="sediment-tip"></div>

<script src="sediment.js"></script>
<script>
  const TIP = Sediment.tip(document.getElementById("tip"));
  const cream = "#edf3d7", border = "rgba(237,243,215,0.5)";
  const nzd = v => "$" + Math.round(v).toLocaleString("en-NZ");

  // dotPlot: items on a shared ordinal risk axis; area encodes amount.
  const LEVELS = ["cash", "conservative", "balanced", "growth", "aggressive"];
  const funds = [
    { label: "Cash PIE",    pos: 0, value: 74230 },
    { label: "Simplicity",  pos: 1, value: 200000 },
    { label: "Smartshares", pos: 2, value: 943034 },
    { label: "Kernel",      pos: 3, value: 434538 },
    { label: "Milford",     pos: 4, value: 120000 },
  ];
  const total = funds.reduce((a, f) => a + f.value, 0);
  Sediment.dotPlot({
    host: document.getElementById("risk"),
    axisPad: 40,
    rows: funds.map(f => ({
      pos: f.pos, value: f.value, label: f.label, valueLabel: nzd(f.value),
      tipHTML: '<div class="t">' + f.label + '</div><div class="row"><span>' +
        LEVELS[f.pos] + "</span><span>" + (f.value / total * 100).toFixed(1) + "%</span></div>",
    })),
    levels: LEVELS,
    avgPos: funds.reduce((a, f) => a + f.value * f.pos, 0) / total,
    dotColor: cream,
    tokens: { hair: border, fg: cream },
    staggerLabels: true,
    tip: TIP,
  });

  // columnChart: diverging columns on a shared baseline, with a target line.
  Sediment.columnChart({
    host: document.getElementById("cols"),
    bars: [
      { value: 6200, label: "Feb" },
      { value: 8100, label: "Mar" },
      { value: -1400, label: "Apr" },
      { value: 7550, label: "May" },
    ],
    posColor: "#81bb8b", negColor: "#e88b7d", ink: cream,
    tokens: { border: border },
    target: 3000, targetLabel: "goal", zeroLabel: "$0",
    tip: TIP,
    tipHTML: i => '<div class="row"><span>net</span><span>' +
      nzd([6200,8100,-1400,7550][i]) + "</span></div>",
  });
</script>
</body>
</html>
